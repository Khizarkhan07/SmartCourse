services:

  course-db:
    image: postgres:16
    container_name: smartcourse_course_db
    environment:
      POSTGRES_USER: course_user
      POSTGRES_PASSWORD: course_pass
      POSTGRES_DB: course_db
    ports:
      - "5437:5432"
    volumes:
      - course_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U course_user -d course_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  course:
    build: services/course
    container_name: smartcourse_course
    ports:
      - "8005:8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.course.loadbalancer.server.port=8000"
      # /courses/*, /modules/*, /lessons/* → full path forwarded (no strip)
      # course-service mounts routers at /courses, /modules, /lessons internally
      - "traefik.http.routers.course.rule=PathPrefix(`/courses`) || PathPrefix(`/modules`) || PathPrefix(`/lessons`)"
      - "traefik.http.routers.course.service=course"
    env_file: .env
    environment:
      SERVICE_NAME: course-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      DATABASE_URL: postgresql+asyncpg://course_user:course_pass@course-db:5432/course_db
      DATABASE_URL_SYNC: postgresql+psycopg2://course_user:course_pass@course-db:5432/course_db
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      TEMPORAL_HOST: host.docker.internal:7233
    depends_on:
      course-db:
        condition: service_healthy

  course-consumer:
    build: services/course
    container_name: smartcourse_course_consumer
    command: python -m events.runner
    restart: on-failure
    env_file: .env
    environment:
      SERVICE_NAME: course-consumer
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      DATABASE_URL: postgresql+asyncpg://course_user:course_pass@course-db:5432/course_db
      DATABASE_URL_SYNC: postgresql+psycopg2://course_user:course_pass@course-db:5432/course_db
      KAFKA_BROKERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    depends_on:
      course-db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  course-worker:
    build: services/course
    container_name: smartcourse_course_worker
    command: python temporal_worker.py
    restart: on-failure
    env_file: .env
    environment:
      SERVICE_NAME: course-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      DATABASE_URL: postgresql+asyncpg://course_user:course_pass@course-db:5432/course_db
      DATABASE_URL_SYNC: postgresql+psycopg2://course_user:course_pass@course-db:5432/course_db
      KAFKA_BROKERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      TEMPORAL_HOST: host.docker.internal:7233
    depends_on:
      course-db:
        condition: service_healthy
      kafka:
        condition: service_healthy

  course-dlq-reprocessor:
    build: services/course
    container_name: smartcourse_course_dlq_reprocessor
    command: python -m events.dlq_reprocessor_runner
    restart: on-failure
    env_file: .env
    environment:
      SERVICE_NAME: course-dlq-reprocessor
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      DATABASE_URL: postgresql+asyncpg://course_user:course_pass@course-db:5432/course_db
      DATABASE_URL_SYNC: postgresql+psycopg2://course_user:course_pass@course-db:5432/course_db
      KAFKA_BROKERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      DLQ_RETRY_INTERVAL_SECONDS: "60"
      DLQ_MAX_ATTEMPTS: "3"
    depends_on:
      course-db:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  course_db_data:
