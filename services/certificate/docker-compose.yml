services:

  certificate-db:
    image: postgres:16
    container_name: smartcourse_certificate_db
    environment:
      POSTGRES_USER: cert_user
      POSTGRES_PASSWORD: cert_pass
      POSTGRES_DB: certificate_db
    ports:
      - "5434:5432"
    volumes:
      - certificate_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cert_user -d certificate_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  certificate:
    build: services/certificate
    container_name: smartcourse_certificate
    ports:
      - "8002:8000"
    env_file: .env
    environment:
      SERVICE_NAME: certificate-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      DATABASE_URL: postgresql+asyncpg://cert_user:cert_pass@certificate-db:5432/certificate_db
      DATABASE_URL_SYNC: postgresql+psycopg2://cert_user:cert_pass@certificate-db:5432/certificate_db
      KAFKA_BROKERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SECRET_KEY: dev-secret-key-change-in-production
    depends_on:
      certificate-db:
        condition: service_healthy

  certificate-consumer:
    build: services/certificate
    container_name: smartcourse_certificate_consumer
    command: python -m events.enrollment_completed_consumer_runner
    env_file: .env
    environment:
      SERVICE_NAME: certificate-consumer
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      DATABASE_URL: postgresql+asyncpg://cert_user:cert_pass@certificate-db:5432/certificate_db
      DATABASE_URL_SYNC: postgresql+psycopg2://cert_user:cert_pass@certificate-db:5432/certificate_db
      KAFKA_BROKERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    depends_on:
      certificate-db:
        condition: service_healthy

volumes:
  certificate_db_data:
