services:

  # ── Traefik API Gateway ──────────────────────────────────────────────────────
  # Replaces the hand-rolled FastAPI reverse proxy.
  # Routes by PathPrefix label on each service; StripPrefix middleware removes
  # the gateway segment before forwarding (e.g. /analytics/overview → /overview).
  # Dashboard: http://localhost:8088
  # Traffic:   http://localhost:8080
  traefik:
    image: traefik:v2.11
    container_name: smartcourse_traefik
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "8080:80"    # main traffic — same host port as the old gateway
      - "8088:8080"  # Traefik dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  # ── Kafka Stack ─────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: smartcourse_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/2181'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: smartcourse_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"   # only the external listener port is exposed to the host
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Two listeners on two separate ports:
      #   PLAINTEXT      port 9092  — external; host machine connects here via localhost:9092
      #   PLAINTEXT_INTERNAL  port 29092  — internal; other Docker containers use kafka:29092
      # Without the split, Kafka returns kafka:9092 as the broker address to the host,
      # which is unreachable outside Docker.
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL

      # Single-broker dev settings — replication factor of 1 is fine locally
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s   # Kafka takes ~20s to be ready after the process starts

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: smartcourse_schema_registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      # Uses the internal listener — Schema Registry is a container, not the host
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

  # ── Temporal ────────────────────────────────────────────────────────────────
  # These services are behind the "temporal-docker" profile.
  # If Temporal is already running natively on localhost:7233, skip this profile —
  # the app's TEMPORAL_HOST config already points there correctly.
  # To use the Docker version instead: docker compose --profile temporal-docker up -d
  temporal_postgres:
    profiles: ["temporal-docker"]
    image: postgres:16
    container_name: smartcourse_temporal_postgres
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    profiles: ["temporal-docker"]
    image: temporalio/auto-setup:1.24
    container_name: smartcourse_temporal
    depends_on:
      temporal_postgres:
        condition: service_healthy
    ports:
      - "7233:7233"
    environment:
      # auto-setup handles schema migration automatically on first start
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal_postgres

  # ── Redis ───────────────────────────────────────────────────────────────────
  # Used for: analytics response cache, Redis-backed rate limiting, JWT blacklist
  redis:
    image: redis:7-alpine
    container_name: smartcourse_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── RabbitMQ ────────────────────────────────────────────────────────────────
  # Message broker for Celery task queue.
  # Management UI at http://localhost:15672 (guest / guest)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: smartcourse_rabbitmq
    ports:
      - "5672:5672"    # AMQP — Celery connects here
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Jaeger ──────────────────────────────────────────────────────────────────
  # All-in-one image: collector + query + UI in a single container.
  # UI at http://localhost:16686
  # OTLP gRPC collector on port 4317 (receives traces from the app)
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: smartcourse_jaeger
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC — app sends traces here
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  # ── Prometheus Pushgateway ──────────────────────────────────────────────────
  # Receives metric pushes from the Temporal worker (separate process).
  pushgateway:
    image: prom/pushgateway:v1.8.0
    container_name: smartcourse_pushgateway
    ports:
      - "9091:9091"

  # ── Prometheus ──────────────────────────────────────────────────────────────
  # Scrapes:
  #   - smartcourse-api  → host.docker.internal:8000/metrics  (FastAPI on host)
  #   - pushgateway      → pushgateway:9091                   (worker metrics)
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: smartcourse_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./provisioning/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    # host.docker.internal is built-in on Docker Desktop (Mac/Windows).
    # On Linux add: extra_hosts: ["host.docker.internal:host-gateway"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - pushgateway

  # ── Grafana ─────────────────────────────────────────────────────────────────
  # Prometheus datasource auto-provisioned via provisioning/grafana/datasources/
  # Login: admin / admin
  grafana:
    image: grafana/grafana:10.4.0
    container_name: smartcourse_grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./provisioning/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  temporal_postgres_data:
  prometheus_data:
  grafana_data:
  redis_data:
  rabbitmq_data:
