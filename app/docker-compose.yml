services:

  # ── Monolith Database ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: smartcourse_postgres
    environment:
      POSTGRES_USER: smartcourse_user
      POSTGRES_PASSWORD: smartcourse_pass
      POSTGRES_DB: smartcourse_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcourse_user -d smartcourse_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
